[workspace]
name = "llm"
version = "0.1.0"
description = "Unified CLI wrapper for ollama, mlx-lm, and vllm-mlx."
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "win-64"]

[dependencies]
python = ">=3.11"
ruff = ">=0.15.11,<0.16"
wxpython = ">=4.2"

[tasks]
llm = "python llm.py"
gui = "python llm_dashboard.py"
lint = "ruff check ."
fmt = "ruff format ."
check = { cmd = "ruff format --check .", depends-on = ["lint"] }

[target.osx-arm64.pypi-dependencies]
pyinstaller = ">=6.0"

[target.osx-arm64.tasks]
build = "python build.py"
clean = "rm -rf dist build __pycache__ *.spec.bak"
