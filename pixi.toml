[workspace]
name = "llm"
version = "0.1.0"
description = "Unified CLI wrapper for ollama, mlx-lm, and vllm-mlx."
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "win-64"]

[dependencies]
python = ">=3.11"
ruff = ">=0.4"

[tasks]
run = "python llm.py"
lint = "ruff check ."
fmt = "ruff format ."
check = "ruff check . && ruff format --check ."
